# 測試邊界條件配置
boundary_testing:
  enabled: true
  temperature_variance: 5  # 測試時的溫度變化容限
  voltage_variance: 0.1    # 測試時的電壓變化容限
  fan_variance: 500        # 測試時的風扇轉速變化容限

# 警告等級定義
severity_levels:
  ok: 0
  warning: 1
  critical: 2
  unknown: 3
